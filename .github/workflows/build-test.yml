name: Cross-Platform Build Test

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  WAILS_VERSION: v3.0.0-alpha.71
  NODE_VERSION: "20"

jobs:
  build-linux:
    name: Linux Build Test (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/task
            ~/go/bin/wails3
          key: ${{ runner.os }}-tools-${{ env.WAILS_VERSION }}

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            fakeroot \
            rpm

      - name: Install Task and Wails CLI
        shell: bash
        run: |
          if [ ! -x "$(go env GOPATH)/bin/task" ]; then
            go install github.com/go-task/task/v3/cmd/task@latest
          fi
          if [ ! -x "$(go env GOPATH)/bin/wails3" ]; then
            go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Prepare Docker environment
        shell: bash
        run: |
          wails3 task setup:docker
        
      - name: Package Linux app
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            wails3 package GOOS=linux GOARCH=arm64
          else
            wails3 package GOOS=linux GOARCH=amd64
          fi

      - name: Normalize Linux artifact names
        shell: bash
        run: |
          mkdir -p release-artifacts/linux-${{ matrix.arch }}
          shopt -s nullglob
          for file in bin/*.AppImage; do cp -v "$file" "release-artifacts/linux-${{ matrix.arch }}/rocket-leaf-linux-${{ matrix.arch }}.AppImage"; done
          for file in bin/*.deb; do cp -v "$file" "release-artifacts/linux-${{ matrix.arch }}/rocket-leaf-linux-${{ matrix.arch }}.deb"; done
          for file in bin/*.rpm; do cp -v "$file" "release-artifacts/linux-${{ matrix.arch }}/rocket-leaf-linux-${{ matrix.arch }}.rpm"; done
          for file in bin/*.pkg.tar.zst; do cp -v "$file" "release-artifacts/linux-${{ matrix.arch }}/rocket-leaf-linux-${{ matrix.arch }}.pkg.tar.zst"; done
          if [ -f bin/rocket-leaf ]; then cp -v bin/rocket-leaf "release-artifacts/linux-${{ matrix.arch }}/rocket-leaf-linux-${{ matrix.arch }}"; fi

      - name: Upload Linux artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-linux-${{ matrix.arch }}
          path: release-artifacts/linux-${{ matrix.arch }}/*
          if-no-files-found: ignore

  build-macos:
    name: macOS Build Test (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            task: darwin:package
            arch: amd64
            artifact_dir: macos-amd64
            artifact_name: build-test-macos-amd64
          - target: arm64
            task: darwin:package
            arch: arm64
            artifact_dir: macos-arm64
            artifact_name: build-test-macos-arm64
          - target: universal
            task: darwin:package:universal
            arch: ''
            artifact_dir: macos-universal
            artifact_name: build-test-macos-universal
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/task
            ~/go/bin/wails3
          key: ${{ runner.os }}-tools-${{ env.WAILS_VERSION }}

      - name: Install Task and Wails CLI
        shell: bash
        run: |
          if [ ! -x "$(go env GOPATH)/bin/task" ]; then
            go install github.com/go-task/task/v3/cmd/task@latest
          fi
          if [ ! -x "$(go env GOPATH)/bin/wails3" ]; then
            go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Package macOS app
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            task ${{ matrix.task }} ARCH=${{ matrix.arch }}
          else
            task ${{ matrix.task }}
          fi

      - name: Normalize macOS artifact names
        shell: bash
        run: |
          mkdir -p release-artifacts/${{ matrix.artifact_dir }}
          if [ -f bin/rocket-leaf ]; then
            cp -v bin/rocket-leaf "release-artifacts/${{ matrix.artifact_dir }}/rocket-leaf-macos-${{ matrix.target }}"
          fi
          if [ -d bin/rocket-leaf.app ]; then
            ditto -c -k --sequesterRsrc --keepParent "bin/rocket-leaf.app" "release-artifacts/${{ matrix.artifact_dir }}/rocket-leaf-macos-${{ matrix.target }}.app.zip"
          fi

      - name: Upload macOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-artifacts/${{ matrix.artifact_dir }}/*
          if-no-files-found: ignore

  build-windows:
    name: Windows Build Test (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/task.exe
            ~/go/bin/wails3.exe
          key: ${{ runner.os }}-tools-${{ env.WAILS_VERSION }}

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Task and Wails CLI
        shell: powershell
        run: |
          if (-not (Test-Path "$(go env GOPATH)\bin\task.exe")) {
            go install github.com/go-task/task/v3/cmd/task@latest
          }
          if (-not (Test-Path "$(go env GOPATH)\bin\wails3.exe")) {
            go install github.com/wailsapp/wails/v3/cmd/wails3@${env:WAILS_VERSION}
          }
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package Windows app
        shell: powershell
        run: task windows:package ARCH=${{ matrix.arch }}

      - name: Normalize Windows artifact names
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "release-artifacts/windows-${{ matrix.arch }}" | Out-Null
          if (Test-Path 'bin/rocket-leaf.exe') {
            Copy-Item 'bin/rocket-leaf.exe' "release-artifacts/windows-${{ matrix.arch }}/rocket-leaf-windows-${{ matrix.arch }}.exe" -Force
          }
          Get-ChildItem 'bin' -Filter 'rocket-leaf-*-installer.exe' -File -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object {
            Copy-Item $_.FullName "release-artifacts/windows-${{ matrix.arch }}/rocket-leaf-windows-${{ matrix.arch }}-installer.exe" -Force
          }
          Get-ChildItem 'bin' -Filter 'rocket-leaf-*.msix' -File -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object {
            Copy-Item $_.FullName "release-artifacts/windows-${{ matrix.arch }}/rocket-leaf-windows-${{ matrix.arch }}.msix" -Force
          }

      - name: Upload Windows artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-windows-${{ matrix.arch }}
          path: release-artifacts/windows-${{ matrix.arch }}/*
          if-no-files-found: ignore

  release-metadata:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-macos
      - build-windows
    steps:
      - name: Generate release metadata
        shell: bash
        run: |
          mkdir -p release-metadata
          printf '%s' '${{ github.ref_name }}' > release-metadata/tag.txt
          printf '%s' '${{ github.sha }}' > release-metadata/sha.txt
          cat > release-metadata/body.md <<'EOF'
          ## Release
          Production release for **${{ github.ref_name }}**.

          ## Downloads
          ### macOS
          - Intel Macs: `rocket-leaf-macos-amd64.app.zip`
            Recommended for Intel-based Macs.
          - Apple Silicon Macs: `rocket-leaf-macos-arm64.app.zip`
            Recommended for M-series Macs.
          - Not sure which one to choose: `rocket-leaf-macos-universal.app.zip`
            Works on both Intel and Apple Silicon Macs.

          ### Windows
          - x64 Installer: `rocket-leaf-windows-amd64-installer.exe`
          - ARM64 Installer: `rocket-leaf-windows-arm64-installer.exe`

          ### Linux
          - x64: `rocket-leaf-linux-amd64.AppImage`, `rocket-leaf-linux-amd64.deb`, `rocket-leaf-linux-amd64.rpm`, `rocket-leaf-linux-amd64.pkg.tar.zst`
          - ARM64: `rocket-leaf-linux-arm64.AppImage`, `rocket-leaf-linux-arm64.deb`, `rocket-leaf-linux-arm64.rpm`, `rocket-leaf-linux-arm64.pkg.tar.zst`

          ## Notes
          - This release is published automatically after cross-platform build verification succeeds.
          - macOS is shipped in amd64, arm64, and universal variants; Windows and Linux are validated in both amd64 and arm64 variants.
          - Checksums are not published yet.
          EOF

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-metadata/*
          if-no-files-found: error
