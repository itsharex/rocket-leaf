name: 发布 GitHub Release

on:
  workflow_run:
    workflows:
      - 跨平台构建测试
    types:
      - completed

permissions:
  contents: read

jobs:
  release:
    name: 生成并发布 Release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载本次构建产物
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ github.event.workflow_run.id }}
          path: release-files
          if_no_artifact_found: fail

      - name: 检查 Release 元数据是否存在
        shell: bash
        run: |
          test -f release-files/release-metadata/tag.txt
          test -f release-files/release-metadata/sha.txt
          test -f release-files/release-metadata/body.md

      - name: 读取 Release 元数据
        id: meta
        shell: bash
        run: |
          TAG_NAME=$(cat release-files/release-metadata/tag.txt)
          TARGET_SHA=$(cat release-files/release-metadata/sha.txt)
          BODY_FILE=release-files/release-metadata/body.md
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "无效的 tag: $TAG_NAME" >&2
            exit 1
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          {
            echo 'release_body<<EOF'
            cat "$BODY_FILE"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: 检出对应代码
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.target_sha }}

      - name: 查看产物列表
        shell: bash
        run: |
          echo "将发布以下文件："
          find release-files -type f | sort

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ steps.meta.outputs.target_sha }}
          body: ${{ steps.meta.outputs.release_body }}
          generate_release_notes: true
          files: |
            release-files/build-test-linux-amd64/*
            release-files/build-test-linux-arm64/*
            release-files/build-test-macos-universal/*
            release-files/build-test-windows-amd64/*
            release-files/build-test-windows-arm64/*
