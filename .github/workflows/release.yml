name: Publish GitHub Release

on:
  workflow_run:
    workflows:
      - Cross-Platform Build Test
    types:
      - completed

permissions:
  contents: read

jobs:
  release:
    name: Create and Publish Release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ github.event.workflow_run.id }}
          path: release-files
          if_no_artifact_found: fail

      - name: Verify release metadata exists
        shell: bash
        run: |
          test -f release-files/release-metadata/tag.txt
          test -f release-files/release-metadata/sha.txt
          test -f release-files/release-metadata/body.md

      - name: Read release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME=$(cat release-files/release-metadata/tag.txt)
          TARGET_SHA=$(cat release-files/release-metadata/sha.txt)
          BODY_FILE=release-files/release-metadata/body.md
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: $TAG_NAME" >&2
            exit 1
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          {
            echo 'release_body<<EOF'
            cat "$BODY_FILE"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: List release artifacts
        shell: bash
        run: |
          echo "Files to be published:"
          find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ steps.meta.outputs.target_sha }}
          body: ${{ steps.meta.outputs.release_body }}
          generate_release_notes: true
          files: |
            release-files/build-test-linux-amd64/*
            release-files/build-test-linux-arm64/*
            release-files/build-test-macos-amd64/*
            release-files/build-test-macos-arm64/*
            release-files/build-test-windows-amd64/*
            release-files/build-test-windows-arm64/*
